<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Workbench</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --text: #f8fafc;
      --card-bg: #1e293b;
      --card-hover: #334155;
      --border: #334155;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 48px 24px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 32px;
    }

    .tools {
      display: grid;
      gap: 12px;
    }

    .tools a {
      display: block;
      padding: 20px 24px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      transition: background 0.15s;
    }

    .tools a:hover { background: var(--card-hover); }

    .tools .name {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .tools .desc {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Web Workbench</h1>
    <div class="tools">
      <a href="minutes/">
        <div class="name">Minutes</div>
        <div class="desc">Elapsed time counter showing whole minutes</div>
      </a>
    </div>
  </div>
</body>
</html>
