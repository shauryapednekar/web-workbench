<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minutes</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --text: #f8fafc;
      --button: #1e293b;
      --button-hover: #334155;
      --accent: #22c55e;
      --accent-text: #052e16;
      --border: #334155;
    }

    :root.light {
      --bg: #f8fafc;
      --text: #0f172a;
      --button: #e2e8f0;
      --button-hover: #cbd5e1;
      --accent: #16a34a;
      --accent-text: #f0fdf4;
      --border: #cbd5e1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      width: min(92vw, 760px);
      text-align: center;
      padding: 32px;
    }

    .display {
      font-variant-numeric: tabular-nums;
      font-size: clamp(5rem, 20vw, 12rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      margin: 0 0 24px;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--button);
      color: var(--text);
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-width: 110px;
    }

    button:hover { background: var(--button-hover); }
    .primary { background: var(--accent); color: var(--accent-text); border-color: transparent; }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      appearance: none;
      border: 1px solid var(--border);
      background: var(--button);
      color: var(--text);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      padding: 0;
      min-width: 0;
    }

    .theme-toggle:hover { background: var(--button-hover); }
  </style>
</head>
<body>
  <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme"></button>
  <main class="wrap">
    <div id="display" class="display">0</div>

    <div class="controls">
      <button id="startPause" class="primary">Start</button>
      <button id="reset">Reset</button>
    </div>
  </main>

  <script>
    const display = document.getElementById('display');
    const startPauseBtn = document.getElementById('startPause');
    const resetBtn = document.getElementById('reset');

    let running = false;
    let startTime = 0;
    let elapsedBeforePause = 0;
    let intervalId = null;

    function saveState() {
      localStorage.setItem('minutes_state', JSON.stringify({
        running, startTime, elapsedBeforePause
      }));
    }

    function loadState() {
      try {
        const s = JSON.parse(localStorage.getItem('minutes_state'));
        if (!s) return;
        elapsedBeforePause = s.elapsedBeforePause || 0;
        if (s.running) {
          running = true;
          startTime = s.startTime;
          startPauseBtn.textContent = 'Stop';
          intervalId = setInterval(render, 250);
        }
      } catch {}
    }

    function getElapsedMs() {
      return running ? elapsedBeforePause + (Date.now() - startTime) : elapsedBeforePause;
    }

    function render() {
      const minutes = Math.floor(getElapsedMs() / 60000);
      display.textContent = minutes.toLocaleString();
    }

    function start() {
      if (running) return;
      running = true;
      startTime = Date.now();
      startPauseBtn.textContent = 'Stop';
      intervalId = setInterval(render, 250);
      render();
      saveState();
    }

    function pause() {
      if (!running) return;
      elapsedBeforePause = getElapsedMs();
      running = false;
      startPauseBtn.textContent = 'Start';
      clearInterval(intervalId);
      intervalId = null;
      render();
      saveState();
    }

    function reset() {
      running = false;
      startTime = 0;
      elapsedBeforePause = 0;
      startPauseBtn.textContent = 'Start';
      clearInterval(intervalId);
      intervalId = null;
      render();
      saveState();
    }

    startPauseBtn.addEventListener('click', () => {
      running ? pause() : start();
    });

    resetBtn.addEventListener('click', reset);

    document.addEventListener('keydown', (event) => {
      if (event.code === 'Space') {
        event.preventDefault();
        running ? pause() : start();
      }
      if (event.key.toLowerCase() === 'r') reset();
    });

    loadState();
    render();

    // Theme toggle
    const themeBtn = document.getElementById('themeToggle');
    function applyTheme(light) {
      document.documentElement.classList.toggle('light', light);
      themeBtn.textContent = light ? '\u2600\uFE0F' : '\uD83C\uDF19';
    }
    const savedLight = localStorage.getItem('theme') === 'light';
    applyTheme(savedLight);
    themeBtn.addEventListener('click', () => {
      const isLight = document.documentElement.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      themeBtn.textContent = isLight ? '\u2600\uFE0F' : '\uD83C\uDF19';
    });
  </script>
</body>
</html>
